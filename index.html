<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PC Co-op Games</title>
  <link rel="icon" type="image/png" href="favicon.png?v=2026-06-14-perf">
  <link rel="apple-touch-icon" href="favicon.png?v=2026-06-14-perf">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Warm the YouTube embed origins at page load so the click->play path skips
       DNS + TLS to all four hosts the embed touches. Cheap (handshakes only, no
       bytes); the iframe/player JS/video are fetched later on interaction. -->
  <link rel="preconnect" href="https://www.youtube-nocookie.com">
  <link rel="preconnect" href="https://www.youtube.com">
  <link rel="preconnect" href="https://s.ytimg.com" crossorigin>
  <link rel="preconnect" href="https://i.ytimg.com">
  <link rel="preconnect" href="https://www.google.com" crossorigin>
  <!-- dns-prefetch fallback (engines that cap/ignore preconnect) + the media CDN
       (*.googlevideo.com) whose exact subdomain isn't known until the player
       resolves it, so it can only be DNS-pre-resolved, never preconnected. -->
  <link rel="dns-prefetch" href="https://www.youtube-nocookie.com">
  <link rel="dns-prefetch" href="https://www.youtube.com">
  <link rel="dns-prefetch" href="https://s.ytimg.com">
  <link rel="dns-prefetch" href="https://i.ytimg.com">
  <link rel="dns-prefetch" href="https://yt3.ggpht.com">
  <link rel="dns-prefetch" href="https://googlevideo.com">
  <link rel="dns-prefetch" href="https://www.google.com">
  <link rel="stylesheet" href="styles.css?v=2026-06-14-perf">
  <script src="data.js?v=2026-06-14-perf" defer></script>
  <script src="app.js?v=2026-06-14-perf" defer></script>
</head>
<body data-theme="dark">
  <div class="app">
    <header class="topbar">
      <div class="title-block">
        <img class="app-icon" src="favicon.png?v=2026-06-14-perf" alt="" width="52" height="52" decoding="async">
        <div class="title-text">
          <h1>PC Co-op Games</h1>
          <p>Co-op games you can actually finish — every entry has credits, a final boss, or a clear win condition.</p>
        </div>
      </div>
      <div class="top-actions">
        <div class="view-mode" id="viewModeControl" role="tablist" aria-label="View mode">
          <button class="view-mode-btn" type="button" data-view="active" role="tab">To play</button>
          <button class="view-mode-btn" type="button" data-view="all" role="tab">All</button>
          <button class="view-mode-btn" type="button" data-view="played" role="tab">Played</button>
        </div>
        <button class="button" id="resetFiltersButton" type="button">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path></svg>
          <span class="btn-label">Reset<span class="btn-label-extra"> filters</span></span>
        </button>
        <button class="button icon-only-mobile" id="themeButton" type="button">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
          <span class="btn-label"> Theme</span>
        </button>
      </div>
    </header>

    <main>
      <section class="table-panel" aria-label="Co-op games table">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="image-col">Image</th>
                <th>
                  <div class="th-control" data-filter="title">
                    <button class="th-sort" type="button" data-sort="title">
                      <span class="th-label">Game</span>
                    </button>
                    <button class="filter-button" type="button" aria-label="Filter by game"><svg viewBox="0 0 24 24"><path d="M4 5h16l-6 8v5l-4-2v-3z"></path></svg></button>
                  </div>
                </th>
                <th>
                  <div class="th-control" data-filter="year">
                    <button class="th-sort" type="button" data-sort="year">
                      <span class="th-label">Year</span>
                    </button>
                    <button class="filter-button" type="button" aria-label="Filter by year"><svg viewBox="0 0 24 24"><path d="M4 5h16l-6 8v5l-4-2v-3z"></path></svg></button>
                  </div>
                </th>
                <th>
                  <div class="th-control" data-filter="genres">
                    <button class="th-sort" type="button" data-sort="genres">
                      <span class="th-label">Genres</span>
                    </button>
                    <button class="filter-button" type="button" aria-label="Filter by genres"><svg viewBox="0 0 24 24"><path d="M4 5h16l-6 8v5l-4-2v-3z"></path></svg></button>
                  </div>
                </th>
                <th>
                  <div class="th-control" data-filter="endingType">
                    <button class="th-sort" type="button" data-sort="endingType">
                      <span class="th-label">Ending</span>
                    </button>
                    <button class="filter-button" type="button" aria-label="Filter by ending type"><svg viewBox="0 0 24 24"><path d="M4 5h16l-6 8v5l-4-2v-3z"></path></svg></button>
                  </div>
                </th>
                <th>
                  <div class="th-control" data-filter="rating">
                    <button class="th-sort" type="button" data-sort="rating" title="Sorted by Wilson score — Steam %positive adjusted for the number of reviews (so a 100%-of-10 game can't outrank a 96%-of-40k one)">
                      <span class="th-label">Rating</span>
                    </button>
                    <button class="filter-button" type="button" aria-label="Filter by rating"><svg viewBox="0 0 24 24"><path d="M4 5h16l-6 8v5l-4-2v-3z"></path></svg></button>
                  </div>
                </th>
                <th>
                  <div class="th-control" data-filter="playersMax">
                    <button class="th-sort" type="button" data-sort="playersMax">
                      <span class="th-label">Players</span>
                    </button>
                    <button class="filter-button" type="button" aria-label="Filter by players"><svg viewBox="0 0 24 24"><path d="M4 5h16l-6 8v5l-4-2v-3z"></path></svg></button>
                  </div>
                </th>
                <th>
                  <div class="th-control" data-filter="hours">
                    <button class="th-sort" type="button" data-sort="hours">
                      <span class="th-label">Hours</span>
                    </button>
                    <button class="filter-button" type="button" aria-label="Filter by hours"><svg viewBox="0 0 24 24"><path d="M4 5h16l-6 8v5l-4-2v-3z"></path></svg></button>
                  </div>
                </th>
                <th>
                  <div class="th-control" data-filter="oneCopy">
                    <button class="th-sort" type="button" data-sort="oneCopy">
                      <span class="th-label">Copies</span>
                    </button>
                    <button class="filter-button" type="button" aria-label="Filter by second-copy requirement"><svg viewBox="0 0 24 24"><path d="M4 5h16l-6 8v5l-4-2v-3z"></path></svg></button>
                  </div>
                </th>
                <th>
                  <div class="th-control" data-filter="price">
                    <button class="th-sort" type="button" data-sort="price">
                      <span class="th-label">Price</span>
                    </button>
                    <button class="filter-button" type="button" aria-label="Filter by price"><svg viewBox="0 0 24 24"><path d="M4 5h16l-6 8v5l-4-2v-3z"></path></svg></button>
                  </div>
                </th>
                <th class="verdict-col">
                  <button class="th-sort th-sort-only" type="button" data-sort="verdict">
                    <span class="th-label">Verdict</span>
                  </button>
                </th>
                <th class="link-col">YouTube</th>
                <th class="action-col">Played</th>
              </tr>
            </thead>
            <tbody id="gamesBody"></tbody>
          </table>
          <div class="empty-state" id="emptyState">No games match.</div>
          <div class="table-footer" id="tableCaption"></div>
        </div>
      </section>
    </main>
  </div>

  <div class="filter-popover" id="filterPopover" hidden></div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <div class="video-modal" id="videoModal" hidden role="dialog" aria-modal="true" aria-label="Gameplay video">
    <div class="video-modal-backdrop" data-close></div>
    <div class="video-modal-frame">
      <button class="video-modal-close" type="button" data-close aria-label="Close">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"></path></svg>
      </button>
      <!-- The YouTube IFrame Player API (app.js) REPLACES this <div> with an
           <iframe> that keeps the same id, so `.video-modal iframe` CSS still
           applies. A placeholder div (not an empty iframe) is the API's
           documented, reliable adoption target. If the API never loads, the
           cold-path fallback in app.js swaps in a plain iframe by id. -->
      <div id="videoFrame"></div>
    </div>
  </div>
</body>
</html>
